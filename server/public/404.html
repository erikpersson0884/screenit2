<!DOCTYPE html>
<html>
<head>
    <title>404 - Not Found</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .screenit-logo {
            position: absolute;
            top: 2rem;
            left: 2rem;
            width: 100px;
        }

        h1 {
            font-size: 4rem;
        }

        .p2, .p3, .p4 {
            opacity: 0;
            transform: translateY(20px);
            animation: glideIn 0.6s ease-in-out forwards;
        }

        /* stagger delays */
        .p2 { animation-delay: 0s; }
        .p3 { animation-delay: .7s; }
        .p4 { animation-delay: 1.4s; }

        @keyframes glideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 0.7;
                transform: translateY(0);
            }
        }

        a {
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <img class="screenit-logo" src="/api/screenit-logo.png" alt="ScreenIT Logo" width="200" />
    <p class="p1">This route does not exist in ScreenIT 😭</p>
    <p class="p2">Go back <a href="/">home</a>?</p>
    <p class="p3">Or check out <a href="/api/docs">the API documentation</a></p>
    <p class="p4">(also available as <a href="/api/docs-json">json</a>)</p>
</body>
</html>
